:root{
  --hall:#07070f;
  --steel-hi:#e8e9ee; --steel:#9aa0ad; --steel-dk:#4a4f5c;
  --red:#d21f2b; --gold:#f5c542;
  --seg:#ff2635; --seg-ghost:#3a0d12;
  --neon-b:#2c72ff; --neon-p:#ff3fd8;
  --txt:#cfd3de;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--hall);
  background-image:radial-gradient(ellipse 120% 70% at 50% -10%, #14142a 0%, var(--hall) 60%);
  font-family:'DotGothic16',monospace;
  color:var(--txt);
  display:flex;justify-content:center;
  padding:14px 10px 40px;
  overflow-x:hidden;
  user-select:none;-webkit-user-select:none;
}
.stage{width:100%;max-width:440px}

/* ===== 筐体 ===== */
.cabinet{
  position:relative;
  border-radius:18px;
  padding:8px;
  background:linear-gradient(160deg,var(--steel-hi) 0%,var(--steel) 30%,var(--steel-dk) 70%,#2c2f38 100%);
  box-shadow:0 18px 50px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.55);
}

/* ===== 大当たりカットイン ===== */
#atari{
  position:absolute;inset:8px;border-radius:12px;overflow:hidden;
  display:none;z-index:20;
  background:
    radial-gradient(circle at 50% 42%, #ffdf6b 0%, #ff9a1f 26%, #e63413 55%, #7c0f0a 100%);
  box-shadow:0 0 40px rgba(255,190,40,.85),0 0 90px rgba(255,90,40,.5);
  cursor:pointer;
}
#atari img{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:100%;height:auto;max-height:100%;
  object-fit:contain;display:block;
}
#atari.show{display:block;animation:slam .55s cubic-bezier(.2,1.6,.35,1)}
#atari.show img{animation:atariGlow 1.2s ease-in-out infinite .6s}
@keyframes slam{
  0%{transform:scale(1.7);opacity:0}
  55%{transform:scale(.97);opacity:1}
  70%{transform:scale(1.03) rotate(.6deg)}
  82%{transform:scale(.99) rotate(-.4deg)}
  100%{transform:scale(1) rotate(0)}
}
@keyframes atariGlow{0%,100%{filter:brightness(1)}50%{filter:brightness(1.22) saturate(1.15)}}
.cabinet.rumble{animation:rumble .45s linear}
@keyframes rumble{
  0%,100%{transform:translate(0,0)}
  15%{transform:translate(-3px,2px)}30%{transform:translate(3px,-2px)}
  45%{transform:translate(-2px,-2px)}60%{transform:translate(2px,2px)}
  75%{transform:translate(-1px,1px)}90%{transform:translate(1px,-1px)}
}
.cabinet-inner{
  border-radius:12px;overflow:hidden;
  background:#000;
  box-shadow:inset 0 0 14px rgba(0,0,0,.9);
}

/* パネル＋ヒットエリア */
.panel{position:relative;font-size:0;transition:transform .08s}
.panel img{width:100%;display:block;pointer-events:none}
.panel.kick{transform:translateY(2px)}
.hit{
  position:absolute;border-radius:50%;
  width:13%;aspect-ratio:1;
  transform:translate(-50%,-50%);
  cursor:pointer;border:none;background:transparent;padding:0;
}
.hit:focus-visible{outline:3px solid var(--gold);outline-offset:2px}
#lever{left:9.3%;top:13.2%;width:12%}
#btn1{left:36.2%;top:14%}
#btn2{left:58.3%;top:14%}
#btn3{left:79.2%;top:14%}
.hit .off{
  position:absolute;inset:6%;border-radius:50%;
  background:radial-gradient(circle,rgba(5,5,8,.72) 55%,rgba(5,5,8,.85) 100%);
  opacity:0;transition:opacity .12s;pointer-events:none;
}
.hit.pressed .off{opacity:1}
#lever .cue{
  position:absolute;inset:-14%;border-radius:50%;pointer-events:none;
  border:2px solid rgba(245,197,66,0);
}
.wait-lever #lever .cue{animation:cue 1.4s ease-in-out infinite}
@keyframes cue{0%,100%{border-color:rgba(245,197,66,0);transform:scale(.92)}50%{border-color:rgba(245,197,66,.85);transform:scale(1)}}

/* ===== 告知ランプユニット ===== */
.lamp-unit{position:relative;background:#000;border-bottom:3px solid #1c1f28}
.lamp-unit img{width:100%;display:block}
#lampOn{position:absolute;inset:0;opacity:0;transition:opacity .18s ease-out;pointer-events:none}
.lamp-unit.lit #lampOn{opacity:1;animation:pulse 1.15s ease-in-out infinite .3s}
@keyframes pulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35) saturate(1.15)}}
#flash{
  position:fixed;inset:0;pointer-events:none;z-index:50;
  background:radial-gradient(circle at 50% 55%, rgba(90,140,255,.5), rgba(255,63,216,.18) 45%, transparent 75%);
  opacity:0;
}
#flash.go{animation:flash .5s ease-out}
@keyframes flash{0%{opacity:1}100%{opacity:0}}

/* ===== 下部データ帯 ===== */
.deck{
  margin-top:10px;border-radius:12px;
  background:linear-gradient(180deg,#12131c,#0b0c13);
  border:1px solid #232633;
  padding:12px 14px;
  display:flex;align-items:stretch;justify-content:space-between;gap:12px;
}
/* クレジット表示（7セグ・実機風） */
.credit{flex:1.2;text-align:center;cursor:default}
.seg-box{
  background:#0d0508;
  border-radius:6px;
  border:2px solid #1e1216;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.9), inset 0 0 22px rgba(255,38,53,.07);
  padding:7px 6px 5px;
  position:relative;overflow:hidden;
}
.seg{
  font-family:'DSEG7',monospace;font-weight:bold;font-style:italic;
  font-size:30px;line-height:1;
  color:var(--seg);
  text-shadow:0 0 7px rgba(255,38,53,.8),0 0 18px rgba(255,38,53,.35);
  position:relative;z-index:1;
}
.seg-ghost{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'DSEG7',monospace;font-weight:bold;font-style:italic;
  font-size:30px;line-height:1;color:var(--seg-ghost);
  padding-top:2px;
}
.credit .lbl,.meter .lbl{
  margin-top:6px;font-size:11px;letter-spacing:.22em;
  color:var(--gold);text-shadow:0 1px 0 #4a3000,0 0 6px rgba(245,197,66,.35);
}
.meter{flex:1;text-align:center;display:flex;flex-direction:column;justify-content:center}
.meter .val{
  font-size:26px;line-height:1.15;letter-spacing:.08em;
  color:#9aa0b8;font-variant-numeric:tabular-nums;
}
.meter.peka .val{color:var(--neon-p);text-shadow:0 0 10px rgba(255,63,216,.55)}
.deck .divider{width:1px;background:#232633}

#msg{
  margin-top:12px;text-align:center;font-size:14px;letter-spacing:.12em;
  min-height:1.6em;color:#8b91a8;
}
#msg.hot{color:var(--gold)}
#msg.win{color:#fff;text-shadow:0 0 12px var(--neon-b),0 0 24px var(--neon-p)}
#msg.dead{color:var(--seg)}

.note{margin-top:22px;text-align:center;font-size:10px;color:#3d4154;letter-spacing:.15em;line-height:2}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<div id="flash"></div>
<div class="stage">
  <div class="cabinet" id="cabinet">

<script>
/* ================= CONFIG =================
   抽選.com組込時はここを調整するだけでよい */
const CONFIG = {
  WIN_RATE: 0.01,        // 当選率（0.01 = 1%）
  SAKI_PEKA_RATE: 0.25,  // 当選時にレバーで即点灯する割合（先ペカ）
  CREDIT_START: 30,      // 初期クレジット（毎日リセット）
  COST: 3,               // 1プレイの消費クレジット
  STORAGE_KEY: 'kuppa9898'
};
/* ========================================== */

const $ = id => document.getElementById(id);
const lampUnit = $('lampUnit'), panel = $('panel'), msg = $('msg'), flash = $('flash');
const btns = [$('btn1'), $('btn2'), $('btn3')];

// ?win=1 でデモ強制当選
const FORCE_WIN = new URLSearchParams(location.search).get('win') === '1';

// ---- 保存データ（クレジットは日次リセット）----
let store = { play:0, peka:0, day:'', credit:CONFIG.CREDIT_START };
try { Object.assign(store, JSON.parse(localStorage.getItem(CONFIG.STORAGE_KEY)) || {}); } catch(e){}
const today = new Date().toISOString().slice(0,10);
if (store.day !== today) { store.day = today; store.credit = CONFIG.CREDIT_START; }
function save(){ try{ localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify(store)); }catch(e){} }
function render(){
  $('creditVal').textContent = store.credit;
  $('playCnt').textContent = store.play;
  $('pekaCnt').textContent = store.peka;
}
render(); save();

/* ---- 効果音（WebAudio合成）----
   実機の録音音源は使用せず、質感を似せて合成している */
let ac;
function audio(){ if(!ac) ac = new (window.AudioContext||window.webkitAudioContext)(); return ac; }

// レバーON「ガコッ」：低域スラップ＋機械ノイズ
function leverSound(){
  const a = audio(), t = a.currentTime;
  const o = a.createOscillator(), g = a.createGain();
  o.type='square'; o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(65,t+.08);
  g.gain.setValueAtTime(.3,t); g.gain.exponentialRampToValueAtTime(.001,t+.11);
  o.connect(g).connect(a.destination); o.start(t); o.stop(t+.12);
  const n = a.createBufferSource(), nb = a.createBuffer(1, a.sampleRate*.06, a.sampleRate);
  const d = nb.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  const ng = a.createGain(); ng.gain.setValueAtTime(.12,t); ng.gain.exponentialRampToValueAtTime(.001,t+.06);
  const f = a.createBiquadFilter(); f.type='highpass'; f.frequency.value=1800;
  n.buffer = nb; n.connect(f).connect(ng).connect(a.destination); n.start(t);
}

// ベット音「ピッ」×3（クレジット減算に同期）
function betBeep(){
  const a = audio(), t = a.currentTime;
  const o = a.createOscillator(), g = a.createGain();
  o.type='square'; o.frequency.value = 1245;
  g.gain.setValueAtTime(.1,t); g.gain.exponentialRampToValueAtTime(.001,t+.05);
  o.connect(g).connect(a.destination); o.start(t); o.stop(t+.06);
}

// ストップボタン「ドッ」：打撃系（低域パンチ＋クリック）
function stopSound(){
  const a = audio(), t = a.currentTime;
  const o = a.createOscillator(), g = a.createGain();
  o.type='sine'; o.frequency.setValueAtTime(210,t); o.frequency.exponentialRampToValueAtTime(90,t+.07);
  g.gain.setValueAtTime(.42,t); g.gain.exponentialRampToValueAtTime(.001,t+.1);
  o.connect(g).connect(a.destination); o.start(t); o.stop(t+.11);
  const c = a.createOscillator(), cg = a.createGain();
  c.type='square'; c.frequency.value=2600;
  cg.gain.setValueAtTime(.05,t); cg.gain.exponentialRampToValueAtTime(.001,t+.025);
  c.connect(cg).connect(a.destination); c.start(t); c.stop(t+.03);
}

// ペカ音「カキーン！」：金属チャイム（非整数倍音＋長い減衰＋きらめき）
function pekaSound(){
  const a = audio(), t = a.currentTime;
  const master = a.createGain(); master.gain.value = .9; master.connect(a.destination);
  // 金属らしさ＝非調和な部分音の重なり
  [[2093,.30,1.6],[2793,.20,1.3],[3520,.14,1.1],[4699,.09,.9],[1568,.10,1.8]].forEach(([f,v,dur])=>{
    const o=a.createOscillator(), g=a.createGain();
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(v,t+.008);
    g.gain.exponentialRampToValueAtTime(.0008,t+dur);
    o.connect(g).connect(master); o.start(t); o.stop(t+dur+.05);
  });
  // アタックの「カッ」
  const n = a.createBufferSource(), nb = a.createBuffer(1, a.sampleRate*.03, a.sampleRate);
  const d = nb.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*(1-i/d.length);
  const ng = a.createGain(); ng.gain.setValueAtTime(.2,t); ng.gain.exponentialRampToValueAtTime(.001,t+.03);
  const hf = a.createBiquadFilter(); hf.type='highpass'; hf.frequency.value=3000;
  n.buffer=nb; n.connect(hf).connect(ng).connect(master); n.start(t);
  // 0.55秒後にもう一度小さく響く（余韻のきらめき）
  [[2093,.10],[3520,.06]].forEach(([f,v])=>{
    const o=a.createOscillator(), g=a.createGain(), t2=t+.55;
    o.type='sine'; o.frequency.value=f;
    g.gain.setValueAtTime(0,t2); g.gain.linearRampToValueAtTime(v,t2+.008);
    g.gain.exponentialRampToValueAtTime(.0008,t2+1.2);
    o.connect(g).connect(master); o.start(t2); o.stop(t2+1.3);
  });
}

// ファンファーレ「パパパ パーン！」：ブラス風2声＋オリジナル進行
function fanfare(){
  const a = audio(), t0 = a.currentTime;
  const master = a.createGain(); master.gain.value=.55; master.connect(a.destination);
  function brass(f, t, dur, v){
    const o=a.createOscillator(), o2=a.createOscillator(), g=a.createGain();
    o.type='sawtooth'; o.frequency.value=f;
    o2.type='square'; o2.frequency.value=f*2; // 倍音で輝きを足す
    const g2=a.createGain(); g2.gain.value=.18;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(v,t+.02);
    g.gain.setValueAtTime(v,t+dur-.05);
    g.gain.exponentialRampToValueAtTime(.001,t+dur);
    o.connect(g); o2.connect(g2).connect(g); g.connect(master);
    o.start(t); o.stop(t+dur+.02); o2.start(t); o2.stop(t+dur+.02);
  }
  // 主旋律（G4→C5→E5→G5、締めはC6ロング）＋和音
  const seq=[[392,0,.16],[523,.18,.16],[659,.36,.16],[784,.54,.22]];
  seq.forEach(([f,dt,dur])=>{ brass(f,t0+dt,dur,.3); brass(f/2,t0+dt,dur,.12); });
  brass(1047,t0+.82,1.1,.32); brass(659,t0+.82,1.1,.16); brass(523,t0+.82,1.1,.14);
  // シンバル風ノイズ
  const n=a.createBufferSource(), nb=a.createBuffer(1,a.sampleRate*1.0,a.sampleRate);
  const d=nb.getChannelData(0); for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);
  const ng=a.createGain(); ng.gain.setValueAtTime(.15,t0+.82); ng.gain.exponentialRampToValueAtTime(.001,t0+1.8);
  const hp=a.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=6000;
  n.buffer=nb; n.connect(hp).connect(ng).connect(master); n.start(t0+.82);
}

// ---- 状態機械 ----
let state = 'idle';
let isWin = false, sakiPeka = false, pressed = 0;
document.body.classList.add('wait-lever');

function setMsg(text, cls){ msg.textContent = text; msg.className = cls || ''; }

function lightLamp(){
  lampUnit.classList.add('lit');
  flash.classList.remove('go'); void flash.offsetWidth; flash.classList.add('go');
  pekaSound();
  setMsg('9898! CHANCE', 'win');
  store.peka++; save(); render();
  // カキーンの余韻の後、大当たりカットイン＋ファンファーレ
  setTimeout(() => {
    const cab = $('cabinet'), at = $('atari');
    at.classList.add('show');
    cab.classList.remove('rumble'); void cab.offsetWidth; cab.classList.add('rumble');
    fanfare();
  }, 950);
}
// カットインはタップで閉じる（ランプは点灯したまま）
$('atari').addEventListener('click', () => $('atari').classList.remove('show'));

function outOfCredit(){
  setMsg('CREDIT不足 また明日', 'dead');
}

$('lever').addEventListener('click', () => {
  if (state !== 'idle') return;
  if (store.credit < CONFIG.COST) { outOfCredit(); return; }

  state = 'spinning'; pressed = 0;
  lampUnit.classList.remove('lit');
  $('atari').classList.remove('show');
  document.body.classList.remove('wait-lever');
  btns.forEach(b => b.classList.remove('pressed'));
  panel.classList.add('kick'); setTimeout(()=>panel.classList.remove('kick'), 90);
  leverSound();

  // クレジットを1ずつ減算（実機のベット挙動）
  for (let i = 0; i < CONFIG.COST; i++) {
    setTimeout(() => { store.credit--; betBeep(); render(); save(); }, 120 + i*90);
  }

  isWin = FORCE_WIN || Math.random() < CONFIG.WIN_RATE;
  sakiPeka = isWin && Math.random() < CONFIG.SAKI_PEKA_RATE;

  store.play++; save(); render();

  if (sakiPeka) setTimeout(lightLamp, 420);
  else setMsg('ボタンを止めろ', 'hot');
});

btns.forEach(b => b.addEventListener('click', () => {
  if (state !== 'spinning' || b.classList.contains('pressed')) return;
  b.classList.add('pressed');
  stopSound();
  pressed++;
  if (pressed === 3) {
    state = 'resolving';
    setTimeout(() => {
      if (isWin && !sakiPeka) lightLamp();
      else if (!isWin) setMsg(store.credit < CONFIG.COST ? 'CREDIT不足 また明日' : '……', store.credit < CONFIG.COST ? 'dead' : '');
      state = 'idle';
      document.body.classList.add('wait-lever');
    }, isWin && !sakiPeka ? 420 : 250);
  }
}));

// 隠し操作：CREDIT長押し1.5秒＝クレジット再補充（デモ用）／PLAY長押し1.5秒＝統計リセット
function longPress(el, fn){
  let tm;
  el.addEventListener('pointerdown', () => { tm = setTimeout(fn, 1500); });
  ['pointerup','pointerleave','pointercancel'].forEach(ev => el.addEventListener(ev, () => clearTimeout(tm)));
}
longPress($('creditMeter'), () => {
  store.credit = CONFIG.CREDIT_START; save(); render(); setMsg('CREDIT補充', '');
});
longPress($('playMeter'), () => {
  store.play = 0; store.peka = 0; save(); render(); setMsg('RESET', '');
});
</script>
